<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Mensalidades - Cruzeiro</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header class="header">
        <h1>Consulta de Mensalidades</h1>
        <p>Graduação e Pós-Graduação - Valores atualizados</p>
    </header>

    <div class="container">
        <!-- Barra de Pesquisa -->
        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input 
                type="text" 
                class="search-input" 
                id="searchInput"
                placeholder="Buscar curso... (ex: Administração, Direito, Medicina)"
            >
        </div>

        <!-- Abas -->
        <div class="tabs">
            <button class="tab active" data-tipo="todos">Todos</button>
            <button class="tab" data-tipo="graduacao">Graduação</button>
            <button class="tab" data-tipo="pos_graduacao">Pós-Graduação</button>
        </div>

        <!-- Estatísticas -->
        <div class="stats">
            <div class="stat">
                <div class="stat-number" id="totalCursos">0</div>
                <div class="stat-label">Cursos Disponíveis</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="totalGrad">0</div>
                <div class="stat-label">Graduações</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="totalPos">0</div>
                <div class="stat-label">Pós-Graduações</div>
            </div>
        </div>

        <!-- Lista de Cursos -->
        <div id="cursosContainer">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Carregando cursos...</p>
            </div>
        </div>
    </div>

    <!-- Link Admin -->
    <a href="/admin" class="admin-link" title="Painel Administrativo">⚙️</a>

    <script src="/js/app.js"></script>
</body>
</html>
